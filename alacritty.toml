[window]
dimensions = {columns = 125, lines = 25}
padding = { x = 10, y = 10 }
dynamic_padding = true
opacity = 0.85
blur = true

[cursor]
style = { shape = "Block", blinking = "On" }

[font]
normal = { family = "Iosevka Term Slab", style = "Normal" }
bold = { family = "Iosevka Term Slab", style = "Bold" }
italic = { family = "Iosevka Term Slab", style = "Italic" }
size = 12

[selection]
save_to_clipboard = true

[scrolling]
history = 10000
multiplier = 3

[mouse]
hide_when_typing = true

[env]
TERM = "xterm-256color"
white = "#fce8c3"

[colors.primary]
foreground = "#ebdbb2"
background = "#1d2021"

[colors.cursor]
text = "#1d2021"
cursor = "#ebdbb2"

[colors.selection]
text = "#1d2021"
background = "#ebdbb2"

[colors.normal]
black = "#1d2021"
red = "#cc241d"
green = "#98971a"
yellow = "#d79921"
blue = "#458588"
magenta = "#b16286"
cyan = "#689d6a"
white = "#a89984"

[colors.bright]
black = "#928374"
red = "#fb4934"
green = "#b8bb26"
yellow = "#fabd2f"
blue = "#83a598"
magenta = "#d3869b"
cyan = "#8ec07c"
white = "#ebdbb2"
